name: deploy-docusaurus-1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4 # Updated to v4 for security/speed

      # 1. ALWAYS install pnpm first
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      # 2. ALWAYS setup Node.js next and link the pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      # 3. Combine your installation into a single, clean step with the correct environment variable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          PNPM_ALLOW_BUILDS: "true" # Instructs pnpm v11 to allow sharp/parcel-watcher scripts

      # 4. Build the site
      - name: Build Docusaurus website
        run: pnpm run build

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: success()
        uses: crazy-max/ghaction-github-pages@v4 # Updated to v4
        with:
          target_branch: gh-pages
          build_dir: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}